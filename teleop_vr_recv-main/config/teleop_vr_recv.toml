[log]
log_level = "info"           # 日志级别: info/warning/error/fatal
enable_debug_output = false   # 是否启用调试输出
log_dir = "./log"            # 日志目录
max_log_size_mb = 100        # 单个日志文件最大大小(MB)

[udp]
host = "0.0.0.0"             # UDP监听地址（0.0.0.0表示监听所有网卡）
port = 8080                   # UDP监听端口
enable_udp_receive = false    # UDP接收开关（默认关闭，需要通过服务启用）

[publish]
# 发布模式:
#   joint     = 只发布双臂关节命令和夹爪命令
#   cartesian = 只发布VR位姿、手柄输入和左右臂末端target_pose
#   both      = 同时发布关节命令和末端target_pose
mode = "cartesian"

# 是否发布 /udp_raw_data 调试topic（内容为 torque + 16个关节/夹爪原始角度）
publish_debug_raw = false

[topics]
# 机械臂关节命令topic（相对路径，支持namespace）
left_arm_topic = "telecon/arm_left/joint_commands_input"
right_arm_topic = "telecon/arm_right/joint_commands_input"

# 夹爪命令topic
left_gripper_topic = "left_gripper/gripper_commands"
right_gripper_topic = "right_gripper/gripper_commands"

# VR设备位姿topic
left_controller_pose_topic = "vr/left_controller/pose"
right_controller_pose_topic = "vr/right_controller/pose"
headset_pose_topic = "vr/headset/pose"

# 手柄输入topic
left_controller_input_topic = "vr/left_controller/input"
right_controller_input_topic = "vr/right_controller/input"

# Debug topic
udp_raw_data_topic = "udp_raw_data"

# 笛卡尔目标位姿topic（默认直接对接 robot_kinematics）
left_arm_target_pose_topic = "arm_left/target_pose"
right_arm_target_pose_topic = "arm_right/target_pose"

[gripper]
default_force = 80.0          # 默认夹爪力度（百分比）

[fk]
# 实时FK位姿订阅（来自 robot_kinematics）
left_arm_fk_pose_topic = "arm_left/fk_pose"
right_arm_fk_pose_topic = "arm_right/fk_pose"

[home_target]
# A/X键回到VR初始姿态时发布的固定末端target_pose。
# 这些值是机器人处于VR_inital姿态时从FK读取的base_link位姿。
enabled = true
left_pose = [0.7324048656654268, 0.3731828053351678, 1.0581095836473335, -0.04307959999168663, 0.06159595547961809, -0.6862686308289023, 0.7234538358964814]
right_pose = [0.7321293328673628, -0.3734108305057274, 1.0580827168268605, 0.04322027383914863, 0.06156938877171767, 0.6858984346948285, 0.7237986982433239]

# 数据平滑滤波配置
[smoother]
enabled = true                           # 是否启用平滑滤波（推荐启用，减少抖动）
smoother_type = "moving_avg"            # 滤波器类型: "none"(不滤波), "moving_avg"(移动平均), "exp_moving_avg"(指数移动平均，推荐), "kalman"(卡尔曼滤波)
position_alpha = 0.25                    # 位置数据平滑系数；moving_avg下约等效5帧窗口
                                        # - 0.1: 强平滑（响应慢但非常平滑）
                                        # - 0.3: 推荐值（平衡平滑度和响应速度）
                                        # - 0.5: 轻度平滑（响应快）
                                        # - 1.0: 不滤波（直接使用原始值）
rotation_alpha = 0.75                    # 四元数姿态SLERP平滑系数
input_alpha = 1.0                        # 保留兼容字段；夹爪和按钮/input按原始值发布，不做平滑

# VR坐标转换配置
[vr_transform]

# 全局工作空间边界限制配置（同时对双臂生效）
scale_factor = 1.0                        # 全局比例缩放（同时对双臂生效）
enable_workspace_limit = true             # 是否启用边界限制（推荐启用！）
max_workspace_radius = 1.0               # 最大工作半径（米）- 根据机械臂实际可达范围设置（中型机械臂推荐0.8-1.2米）
boundary_type = "clamp"                  # 边界类型: "clamp"(硬限制) 或 "saturate"(平滑限制+硬限制)

# 左臂VR坐标转换配置
[vr_transform.left_arm]

# 坐标轴映射（1-based索引：1=X轴, 2=Y轴, 3=Z轴, 负数表示反向）
# 统一VR基坐标到机器人base_link映射：
# VR X(右)→base -Y, VR Y(上)→base +Z, VR Z(前)→base +X
axis_mapping = [-2, 3, 1]

# 工作空间球心（与 target_pose 相同坐标系，通常是 base_link）
# 当 workspace_center_use_topic=true 时，会订阅 topic 实时更新球心
# 注意：topic模式下，未收到首帧球心前不会发布该臂 target_pose
workspace_center = [0.2, 0.25, 0.6]
workspace_center_use_topic = true
workspace_center_topic = "arm_left/workspace_center"

# 右臂VR坐标转换配置
[vr_transform.right_arm]

# 右臂与左臂保持同一base_link映射（推荐统一）
axis_mapping = [-2, 3, 1]

# 工作空间球心（与 target_pose 相同坐标系，通常是 base_link）
# 注意：topic模式下，未收到首帧球心前不会发布该臂 target_pose
workspace_center = [0.2, -0.25, 0.6]
workspace_center_use_topic = true
workspace_center_topic = "arm_right/workspace_center"

# ====== 坐标轴映射说明 ======
# 1-based索引: 1=X轴, 2=Y轴, 3=Z轴
# 负数表示反向: -1=-X轴, -2=-Y轴, -3=-Z轴
#
# 常用映射示例：
# [1, 2, 3]   - 不映射（VR的XYZ → 机器人的XYZ）
# [1, 3, 2]   - VR的Y和Z互换
# [-1, 2, 3]  - VR的X轴反向
# [3, 1, 2]   - VR的X→机器人Z, Y→机器人X, Z→机器人Y
# [-3, -1, 2] - VR的X→机器人-Z, Y→机器人-X, Z→机器人Y
